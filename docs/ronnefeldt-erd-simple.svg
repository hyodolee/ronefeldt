<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #fbfaf8; }
      .table { fill: #fff; stroke: #1f1f1f; stroke-width: 2; }
      .head { fill: #f5f1eb; stroke: #1f1f1f; stroke-width: 2; }
      .title { font: 700 21px Georgia, "Times New Roman", serif; fill: #111; }
      .field { font: 17px Georgia, "Times New Roman", serif; fill: #111; }
      .small { font: 14px Arial, sans-serif; fill: #555; }
      .line { fill: none; stroke: #333; stroke-width: 2; }
      .muted { fill: #f9f9f9; }
    </style>
    <marker id="crow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 12 7 L 2 2 M 12 7 L 2 12 M 12 7 L 2 7" stroke="#333" stroke-width="1.8" fill="none"/>
    </marker>
    <marker id="one" markerWidth="10" markerHeight="14" refX="8" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 3 2 L 3 12 M 7 2 L 7 12" stroke="#333" stroke-width="1.8" fill="none"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text class="title" x="56" y="50">Ronnefeldt Simple ERD</text>
  <text class="small" x="56" y="76">초기 구현용 단순 DB 구조: 회원, 상품, 찜, 장바구니, 주문, 결제, 리뷰, 문의 중심</text>

  <!-- MEMBERS -->
  <g id="members">
    <rect class="table" x="60" y="150" width="300" height="320"/>
    <rect class="head" x="60" y="150" width="300" height="54"/>
    <text class="title" x="210" y="184" text-anchor="middle">members</text>
    <text class="field" x="82" y="236">PK id : bigint</text>
    <text class="field" x="82" y="266">email : varchar</text>
    <text class="field" x="82" y="296">name : varchar</text>
    <text class="field" x="82" y="326">nickname : varchar</text>
    <text class="field" x="82" y="356">provider : varchar</text>
    <text class="field" x="82" y="386">provider_user_id : varchar</text>
    <text class="field" x="82" y="416">grade : varchar</text>
    <text class="field" x="82" y="446">points / role / status</text>
  </g>

  <!-- CATEGORIES -->
  <g id="categories">
    <rect class="table" x="600" y="110" width="280" height="210"/>
    <rect class="head" x="600" y="110" width="280" height="54"/>
    <text class="title" x="740" y="144" text-anchor="middle">categories</text>
    <text class="field" x="622" y="196">PK id : bigint</text>
    <text class="field" x="622" y="226">parent_id : bigint</text>
    <text class="field" x="622" y="256">name : varchar</text>
    <text class="field" x="622" y="286">slug : varchar</text>
  </g>

  <!-- PRODUCTS -->
  <g id="products">
    <rect class="table" x="600" y="390" width="330" height="360"/>
    <rect class="head" x="600" y="390" width="330" height="54"/>
    <text class="title" x="765" y="424" text-anchor="middle">products</text>
    <text class="field" x="622" y="476">PK id : bigint</text>
    <text class="field" x="622" y="506">FK category_id : bigint</text>
    <text class="field" x="622" y="536">name : varchar</text>
    <text class="field" x="622" y="566">summary : varchar</text>
    <text class="field" x="622" y="596">description : text</text>
    <text class="field" x="622" y="626">price : int</text>
    <text class="field" x="622" y="656">main_image_url : varchar</text>
    <text class="field" x="622" y="686">search_keywords : text</text>
    <text class="field" x="622" y="716">status / is_sold_out</text>
  </g>

  <!-- WISHLISTS -->
  <g id="wishlists">
    <rect class="table" x="430" y="800" width="270" height="140"/>
    <rect class="head" x="430" y="800" width="270" height="48"/>
    <text class="title" x="565" y="831" text-anchor="middle">wishlists</text>
    <text class="field" x="452" y="880">PK id : bigint</text>
    <text class="field" x="452" y="910">FK member_id / product_id</text>
  </g>

  <!-- CARTS -->
  <g id="carts">
    <rect class="table" x="60" y="560" width="270" height="150"/>
    <rect class="head" x="60" y="560" width="270" height="48"/>
    <text class="title" x="195" y="591" text-anchor="middle">carts</text>
    <text class="field" x="82" y="640">PK id : bigint</text>
    <text class="field" x="82" y="670">FK member_id : bigint</text>
    <text class="field" x="82" y="700">created_at : datetime</text>
  </g>

  <!-- CART ITEMS -->
  <g id="cart_items">
    <rect class="table" x="385" y="560" width="270" height="180"/>
    <rect class="head" x="385" y="560" width="270" height="48"/>
    <text class="title" x="520" y="591" text-anchor="middle">cart_items</text>
    <text class="field" x="407" y="640">PK id : bigint</text>
    <text class="field" x="407" y="670">FK cart_id : bigint</text>
    <text class="field" x="407" y="700">FK product_id : bigint</text>
    <text class="field" x="407" y="730">qty / delivery_type</text>
  </g>

  <!-- ORDERS -->
  <g id="orders">
    <rect class="table" x="1040" y="150" width="330" height="330"/>
    <rect class="head" x="1040" y="150" width="330" height="54"/>
    <text class="title" x="1205" y="184" text-anchor="middle">orders</text>
    <text class="field" x="1062" y="236">PK id : bigint</text>
    <text class="field" x="1062" y="266">FK member_id : bigint</text>
    <text class="field" x="1062" y="296">order_no : varchar</text>
    <text class="field" x="1062" y="326">order_status : varchar</text>
    <text class="field" x="1062" y="356">total_amount : int</text>
    <text class="field" x="1062" y="386">receiver_name / phone</text>
    <text class="field" x="1062" y="416">address : varchar</text>
    <text class="field" x="1062" y="446">delivery_status : varchar</text>
  </g>

  <!-- ORDER ITEMS -->
  <g id="order_items">
    <rect class="table" x="1040" y="560" width="330" height="230"/>
    <rect class="head" x="1040" y="560" width="330" height="54"/>
    <text class="title" x="1205" y="594" text-anchor="middle">order_items</text>
    <text class="field" x="1062" y="646">PK id : bigint</text>
    <text class="field" x="1062" y="676">FK order_id : bigint</text>
    <text class="field" x="1062" y="706">FK product_id : bigint</text>
    <text class="field" x="1062" y="736">product_name : varchar</text>
    <text class="field" x="1062" y="766">qty / unit_price / total_price</text>
  </g>

  <!-- PAYMENTS -->
  <g id="payments">
    <rect class="table" x="1040" y="840" width="330" height="130"/>
    <rect class="head" x="1040" y="840" width="330" height="48"/>
    <text class="title" x="1205" y="871" text-anchor="middle">payments</text>
    <text class="field" x="1062" y="920">PK id : bigint</text>
    <text class="field" x="1062" y="950">FK order_id / provider / amount</text>
  </g>

  <!-- REVIEWS -->
  <g id="reviews">
    <rect class="table" x="60" y="800" width="270" height="140"/>
    <rect class="head" x="60" y="800" width="270" height="48"/>
    <text class="title" x="195" y="831" text-anchor="middle">reviews</text>
    <text class="field" x="82" y="880">PK id : bigint</text>
    <text class="field" x="82" y="910">FK member / product</text>
  </g>

  <!-- INQUIRIES -->
  <g id="inquiries">
    <rect class="table" x="740" y="800" width="270" height="140"/>
    <rect class="head" x="740" y="800" width="270" height="48"/>
    <text class="title" x="875" y="831" text-anchor="middle">inquiries</text>
    <text class="field" x="762" y="880">PK id : bigint</text>
    <text class="field" x="762" y="910">FK member / product</text>
  </g>

  <!-- MAIN RELATIONS -->
  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 880 245 L 1040 245"/>
  <text class="small" x="938" y="232">places</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 330 635 L 385 635"/>
  <text class="small" x="345" y="622">has</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 360 365 L 1040 300"/>
  <text class="small" x="520" y="340">member orders</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M 360 635 L 60 635"/>
  <text class="small" x="154" y="548">member cart</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 740 320 L 760 390"/>
  <text class="small" x="760" y="360">contains</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 655 650 L 600 650"/>
  <text class="small" x="662" y="638">product</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 1205 480 L 1205 560"/>
  <text class="small" x="1220" y="525">contains</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#one)" d="M 1205 790 L 1205 840"/>
  <text class="small" x="1220" y="820">paid by</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 930 610 L 1040 690"/>
  <text class="small" x="960" y="645">ordered</text>

  <!-- SIDE RELATIONS -->
  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 210 470 L 195 800"/>
  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 600 710 L 330 870"/>
  <text class="small" x="250" y="775">reviews</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 290 470 L 430 870"/>
  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 600 730 L 700 870"/>
  <text class="small" x="410" y="775">wishlist</text>

  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 350 420 L 740 870"/>
  <path class="line" marker-start="url(#one)" marker-end="url(#crow)" d="M 930 720 L 875 800"/>
  <text class="small" x="720" y="775">inquiries</text>

  <!-- visual grouping labels -->
  <rect class="muted" x="48" y="108" width="326" height="22" rx="4"/>
  <text class="small" x="60" y="124">회원 중심</text>
  <rect class="muted" x="588" y="78" width="356" height="22" rx="4"/>
  <text class="small" x="600" y="94">상품/검색 중심</text>
  <rect class="muted" x="1028" y="108" width="356" height="22" rx="4"/>
  <text class="small" x="1040" y="124">주문/결제 중심</text>
</svg>
